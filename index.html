<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具集合 Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <!-- PWA / iOS home screen -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="工具集合">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">🧰</span>
      <span class="logo-text">工具 Dashboard</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tool="translator" onclick="switchTool('translator')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 8l4 12m0 0l4-12m-4 12H3m14-4h6m-3-3v6M3 3l18 18"/>
        </svg>
        <span>翻譯器</span>
      </button>
      <button class="nav-item" data-tool="cangjie" onclick="switchTool('cangjie')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M7 7h4m-2-2v4M14 7h3M7 14h10M7 17h5"/>
        </svg>
        <span>倉頡轉換器</span>
      </button>
    </nav>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="header">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <h1 class="header-title" id="headerTitle">翻譯器</h1>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Tool: Translator -->
    <section class="tool-panel active" id="tool-translator">
      <div class="translator-container">
        <!-- Source Language -->
        <div class="translator-pane">
          <div class="lang-selector">
            <select id="sourceLang">
              <option value="zh-TW">繁體中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="es">Español</option>
              <option value="pt">Português</option>
              <option value="ru">Русский</option>
              <option value="ar">العربية</option>
              <option value="th">ไทย</option>
              <option value="vi">Tiếng Việt</option>
              <option value="id">Bahasa Indonesia</option>
              <option value="nl">Nederlands</option>
            </select>
            <button class="swap-btn" onclick="swapLanguages()" title="交換語言">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/>
              </svg>
            </button>
          </div>
          <div class="textarea-wrapper">
            <textarea id="sourceText" placeholder="輸入想翻譯的文字..." oninput="handleTranslateInput()"></textarea>
            <button class="clear-btn" onclick="clearSource()" title="清除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
            <span class="char-count" id="sourceCharCount">0</span>
          </div>
        </div>

        <!-- Target Language -->
        <div class="translator-pane">
          <div class="lang-selector">
            <select id="targetLang">
              <option value="en" selected>English</option>
              <option value="zh-TW">繁體中文</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="es">Español</option>
              <option value="pt">Português</option>
              <option value="ru">Русский</option>
              <option value="ar">العربية</option>
              <option value="th">ไทย</option>
              <option value="vi">Tiếng Việt</option>
              <option value="id">Bahasa Indonesia</option>
              <option value="nl">Nederlands</option>
            </select>
          </div>
          <div class="textarea-wrapper">
            <textarea id="targetText" placeholder="翻譯結果..." readonly></textarea>
            <button class="copy-btn" onclick="copyTranslation()" title="複製">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="translator-footer">
        <div class="api-key-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" class="key-icon">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
          <span class="key-label">Google API 金鑰：</span>
          <input
            type="password"
            id="googleApiKey"
            class="api-key-input"
            placeholder="貼上您的 API 金鑰..."
            oninput="saveApiKey()"
          />
          <span class="key-status" id="keyStatus"></span>
        </div>
      </div>
    </section>

    <!-- Tool: Cangjie Converter -->
    <section class="tool-panel" id="tool-cangjie">
      <div class="cangjie-container">
        <div class="cangjie-controls">
          <div class="display-toggle">
            <span class="toggle-label">顯示格式：</span>
            <button class="toggle-btn active" data-mode="roots" onclick="setCangjieMode('roots')">倉頡字根</button>
            <button class="toggle-btn" data-mode="code" onclick="setCangjieMode('code')">英文鍵盤碼</button>
          </div>
        </div>
        <div class="cangjie-workspace">
          <div class="cangjie-input-pane">
            <label class="pane-label">輸入繁體中文</label>
            <div class="textarea-wrapper">
              <textarea id="cangjieInput" placeholder="在此輸入繁體中文字..." oninput="convertCangjie()"></textarea>
              <button class="clear-btn" onclick="clearCangjieInput()" title="清除">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="cangjie-output-pane">
            <label class="pane-label">倉頡碼結果</label>
            <div class="textarea-wrapper">
              <div class="cangjie-result" id="cangjieResult">
                <span class="placeholder-text">結果將顯示在這裡...</span>
              </div>
              <button class="copy-btn" onclick="copyCangjie()" title="複製">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <!-- Character detail table -->
        <div class="cangjie-detail" id="cangjieDetail" style="display:none;">
          <table class="detail-table">
            <thead>
              <tr>
                <th>字元</th>
                <th>倉頡字根</th>
                <th>鍵盤碼</th>
              </tr>
            </thead>
            <tbody id="cangjieDetailBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
